---
- name: Install and configure ansible
  hosts: demo
  become: true
  vars:
    packages: 
      - git
      - ansible
    playbook_name: playbooks/example.yaml
    default_inventory_file: /etc/ansible/hosts
    git_url: https://github.com/Restour1/ansible-IT-Moscow.git
    shell_command: "ansible-pull --accept-host-key -i 'localhost,' -U {{ git_url }} {{ playbook_name }}"

  tasks:
    - name: "Download packages"
      dnf:
        name: "{{ packages }}"
        state: latest
        use_backend: dnf4

    - name: "Configure ansible"
      shell: "{{ shell_command }}"

    - name: "Automatic execute"
      cron:
        name: "start ansible pull"
        special_time: reboot
        job: "{{shell_command}}"
      
