---
- name: Make dirs
  hosts: demo
  become: true

  vars:
    user_name: student2
    config_path: "/home/{{user_name}}/.config/plasma-org.kde.plasma.desktop-appletsrc"
    wallpaper_name: itmoscow.png
    wallpaper_path: /usr/share/wallpapers/

  handlers:
    - name: "Перезапуск kde"
      command: "systemctl --user --machine={{user_name}}@.host restart plasma-plasmashell.service"

  tasks:
    # - name: create dirs
    #   file:
    #     path: /usr/share/kde4/apps/desktoptheme/default/
    #     state: directory
    #     mode: '0755'

    # - name: Set wallpaper
    #   shell: plasma-apply-wallpaperimage {{wallpaper_path}}{{wallpaper_name}}

    - name: Set wallpaper
      community.general.kdeconfig:
        path: "{{ config_path }}"
        values:
          - groups: [Containments, 1, Wallpaper, org.kde.image, General]
            key: Image
            value: "{{ wallpaper_path }}{{ wallpaper_name }}"
        mode: '0644'
      notify: "Перезапуск kde"